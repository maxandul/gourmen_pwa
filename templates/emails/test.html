{% extends "emails/base.html" %}

<p style="margin:0 0 12px;font-size:15px;line-height:1.6;color:#1e293b;">
  Hallo {{ display_name }}
</p>
<p style="margin:0 0 12px;font-size:15px;line-height:1.6;color:#1e293b;">
  Diese E-Mail wurde als Smoke-Test aus dem Admin-Bereich des Gourmen Kulinarik-Vereins versendet.
</p>
<p style="margin:0;font-size:15px;line-height:1.6;color:#1e293b;">
  Ausgelöst von: <strong>{{ actor_email }}</strong>
</p>
{% endblock %}
