<!doctype html>
<html lang="de">
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,sans-serif;color:#0f172a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f7fb;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">
          <tr>
            <td style="background:#dc693c;padding:20px 24px;">
              <div style="font-size:22px;font-weight:700;color:#ffffff;">Gourmen</div>
              <div style="font-size:13px;color:#fee8df;margin-top:4px;">Kulinarik-Verein</div>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="background:#f8fafc;padding:16px 24px;font-size:12px;line-height:1.5;color:#475569;">
              Diese Nachricht wurde automatisch vom Gourmen Kulinarik-Verein versendet.<br>
              Antworten gehen an die konfigurierte Vereinsadresse.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
